name: зј–иҜ‘дё»зЁӢеәҸ
on:
  push:
    branches:
      - main
    paths:
      - 'build/Lede/relevance/start'

env:
  GITHUB_LINK: https://github.com/${{github.repository}}
  GIT_ACTOR: ${{github.actor}}
  GIT_REPOSITORY: ${{github.repository}}
  RUN_NUMBER: ${{github.run_number}}
  RUN_WORKFLOW: ${{github.workflow}}
  REPO_TOKEN: ${{ secrets.REPO_TOKEN }}
  PUSH_PLUS_TOKEN: ${{ secrets.PUSH_PLUS_TOKEN }}
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
  WX_TOKEN: ${{ secrets.WX_TOKEN }}
  CURL: ${{ secrets.CURL }}
  TZ: Asia/Shanghai

jobs:
  build:
    name: зј–иҜ‘ "${{matrix.target}}"
    runs-on: ubuntu-22.04
    if: ${{ github.event.repository.owner.id }} == ${{ github.event.sender.id }}
    
    env:
      FOLDER_NAME: ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        target: [Lede]

    steps:
    - name: еҮҶеӨҮз»“жқҹ
      uses: actions/checkout@v4

    - name: жЈҖжөӢж–Үд»¶е’ҢеҜ№жҜ”дёҠжёёзүҲжң¬
      run: |
        cd ${GITHUB_WORKSPACE}
        bash <(curl -fsSL https://raw.githubusercontent.com/shidahuilang/common/main/custom/first.sh)
        if [[ -n "${{ github.event.workflow }}" ]] || [[ -n "${{ github.event.schedule }}" ]]; then
          source ${GITHUB_WORKSPACE}/build/${FOLDER_NAME}/settings.ini
        else
          source ${GITHUB_WORKSPACE}/build/${FOLDER_NAME}/relevance/settings.ini
        fi
        source ${GITHUB_WORKSPACE}/build/${{ env.FOLDER_NAME }}/common.sh && Diy_menu1

    - name: жё…зҗҶеӣ иҪ¬жҚўCPUиҖҢеҒңжӯўзҡ„е·ҘдҪңжөҒзЁӢ
      run: |
        cd ${GITHUB_WORKSPACE}
        source build/${FOLDER_NAME}/common.sh && Diy_delruns

    - name: CPUжЈҖжөӢ
      run: |
        cd ${GITHUB_WORKSPACE}
        source build/${FOLDER_NAME}/common.sh && CPU_Priority
        
    - name: жё…зҗҶз©әй—ҙ
      working-directory: /openwrt
      run: |
       git clone $GITHUB_LINK -b $REPO_BRANCH openwrt
       ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt
        
    - name: йғЁзҪІзј–иҜ‘зҺҜеўғ
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        source ${GITHUB_WORKSPACE}/build/${{matrix.target}}/common.sh && Diy_update
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /${{ env.DIY_WORK }}
        sudo chown ${USER}:${GROUPS} /${{ env.DIY_WORK }}

    #- name: еҚҮзә§rustcеҲ°1.70.0
      #run: |
                #curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain 1.70.0
                #source $HOME/.cargo/env
                
    - name: дёӢиҪҪ"${{matrix.target}}"жәҗз Ғ
      working-directory: /${{ env.DIY_WORK }}
      run: |
        git clone -b "${REPO_BRANCH}" --single-branch "${REPO_URL}" openwrt
        ln -sf /${{ env.DIY_WORK }}/openwrt ${GITHUB_WORKSPACE}/openwrt
        cp -Rf ${GITHUB_WORKSPACE}/build ${GITHUB_WORKSPACE}/openwrt/build
        chmod -R +x ${GITHUB_WORKSPACE}/openwrt/build
    
    - name: е…¬ е‘Ҡ
      run: |
        cd openwrt
        source ${BUILD_PATH}/common.sh && Diy_menu2
 
    - name: жӣҙж–°жҸ’д»¶жәҗ
      run: |
        cd openwrt
        source ${BUILD_PATH}/common.sh && Diy_menu3
 
    - name: еҠ иҪҪиҮӘе®ҡд№үи®ҫзҪ®
      run: |
        cd openwrt
        source ${BUILD_PATH}/common.sh && Diy_menu4
        
    - name: е®үиЈ…жҸ’д»¶жәҗ
      run: |
        cd openwrt
        source ${BUILD_PATH}/common.sh && Diy_menu5



    - name: з”ҹжҲҗ"${{matrix.target}}"й…ҚзҪ®ж–Үд»¶
      run: |
        cd openwrt
        source ${BUILD_PATH}/common.sh && Diy_menu6
        
    - name: зј–иҜ‘дҝЎжҒҜ
      continue-on-error: true
      if: env.COMPILATION_INFORMATION == 'true'
      run: |
        cd openwrt
        source ${BUILD_PATH}/common.sh && Diy_xinxi
        
    - name: зј“еӯҳеҠ йҖҹ
      if: env.CACHEWRTBUILD_SWITCH == 'true'
      uses: stupidloud/cachewrtbuild@main
      with:
        ccache: 'true'
        mixkey: "${{ env.TARGET_PROFILE }}"
        prefix: ${{ github.workspace }}/openwrt
        
    - name: дёӢиҪҪиҪҜд»¶еҢ…
      id: package
      run: |
        cd openwrt
        make defconfig
        make download -j16
    
    - name: ејҖе§Ӣзј–иҜ‘еӣәд»¶
      id: compile
      run: |
        cd openwrt
        echo -e "$(nproc) thread compile"
        make -j$(($(nproc) + 1)) || make -j1 V=s
        echo "date=$(date "+%Y%m%d%H%M%S")" >> ${GITHUB_ENV}
        source ${BUILD_PATH}/common.sh && firmware_jiance
        
    - name: иҮӘеҠЁжү“еҢ…Amlogic_Rockchipзі»еҲ—еӣәд»¶
      if: steps.compile.outcome == 'success' && env.PACKAGING_FIRMWARE == 'true'
      uses: ncipollo/release-action@main
      with:
        name: rootfs.tar.gz
        tag: targz
        token: ${{ secrets.REPO_TOKEN }}
        allowUpdates: true
        replacesArtifacts: true
        artifacts: openwrt/targz/*rootfs.tar.gz

    - name: ж•ҙзҗҶеӣәд»¶ж–Үд»¶еӨ№(йңҖй…ҚеҗҲdiy-part.shи®ҫе®ҡдҪҝз”Ё)
      continue-on-error: true
      if: steps.compile.outcome == 'success'
      id: organizer
      run: |
        cd openwrt
        source ${BUILD_PATH}/common.sh && Diy_firmware
        
    - name: дёҠдј еӣәд»¶еңЁ github Artifacts
      if: steps.compile.outcome == 'success' && env.UPLOAD_FIRMWARE == 'true'
      uses: actions/upload-artifact@main
      with:
        name: ${{ env.SOURCE }}-${{ env.LUCI_EDITION }}-${{ env.TARGET_PROFILE }}-firmware-${{ env.Firmware_Date }}
        path: ${{ env.FIRMWARE_PATH }}
    
    - name: еҸ‘еёғеӣәд»¶
      if: steps.compile.outcome == 'success' && env.UPLOAD_RELEASE == 'true' && env.ING_FIRMWAR == 'true' && env.REPO_TOKEN
      uses: ncipollo/release-action@main
      with:
        name: ${{ env.SOURCE }}-${{ env.PROMPT_TING }}
        tag: a${{ env.date }}
        token: ${{ secrets.REPO_TOKEN }}
        allowUpdates: true
        body: ${{ env.Tongzhi_Date }}
        artifacts: "${{ env.FIRMWARE_PATH }}/*"
        
    - name: еҸ‘йҖҒ[еңЁзәҝжӣҙж–°еӣәд»¶]иҮідә‘з«Ҝ1
      id: autoup
      if: steps.compile.outcome == 'success' && env.UPDATE_FIRMWARE_ONLINE == 'true' && env.REPO_TOKEN
      uses: ncipollo/release-action@main
      with:
        name: AutoUpdate
        tag: ${{ env.Update_tag }}
        token: ${{ secrets.REPO_TOKEN }}
        allowUpdates: true
        body: ${{ env.Tongzhi_Date }}
        artifacts: "${{ env.BIN_PATH }}/*"
        
    - name: еҸ‘йҖҒ[еңЁзәҝжӣҙж–°еӣәд»¶]иҮідә‘з«Ҝ2
      if: steps.autoup.outcome == 'success' && env.UPDATE_FIRMWARE_ONLINE == 'true' && env.REPO_TOKEN
      run: |
        mkdir -p Github_Api
        cd Github_Api
        curl -H "Authorization: Bearer ${{ secrets.REPO_TOKEN }}" https://api.github.com/repos/${{ github.repository }}/releases/tags/${{ env.Update_tag }} -o zzz_api
        if [[ $? -ne 0 ]]; then
          curl -H "Authorization: Bearer ${REPO_TOKEN}" https://api.github.com/repos/${GIT_REPOSITORY}/releases/tags/${Update_tag} > zzz_api
        fi
        
    - name: еҸ‘йҖҒ[еңЁзәҝжӣҙж–°еӣәд»¶]иҮідә‘з«Ҝ3
      if: steps.autoup.outcome == 'success' && env.UPDATE_FIRMWARE_ONLINE == 'true' && env.REPO_TOKEN
      uses: ncipollo/release-action@main
      with:
        name: AutoUpdate-${{ env.TARGET_BOARD }}
        tag: ${{ env.Update_tag }}
        token: ${{ secrets.REPO_TOKEN }}
        artifacts: "Github_Api/*"
        allowUpdates: true
        body: ${{ env.Tongzhi_Date }}


    - name: TelegramжҲ–pushplusдҝЎжҒҜйҖҡзҹҘ
      if: env.PUSH_PLUS_TOKEN && env.INFORMATION_NOTICE == 'PUSH' || env.TELEGRAM_BOT_TOKEN && env.INFORMATION_NOTICE == 'TG'
      run: |
        if [[ "${{ env.INFORMATION_NOTICE }}" == "TG" ]]; then
          if [[ "${{steps.compile.outcome}}" == 'success' ]]; then
            curl -k --data chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" --data "text=жҲ‘дәІзҲұзҡ„вңЁдё»дәәвңЁпјҡжӮЁдҪҝз”ЁгҖҗ${{matrix.target}}гҖ‘ж–Үд»¶еӨ№зј–иҜ‘гҖҗ${REPO_BRANCH}еҲҶж”Ҝзҡ„${{env.TARGET_PROFILE}}гҖ‘еӣәд»¶йЎәеҲ©зј–иҜ‘е®ҢжҲҗдәҶвңҢпёҸрҹ’Ҝрҹ’җ(${{env.WAREHOUSE_MAN}}д»“еә“зҡ„#${{env.RUN_NUMBER}}еҸ·)пјҒ($(date +%Yе№ҙ%mжңҲ%dеҸ·%Hж—¶%MеҲҶ))" "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage"
          fi
        fi
        if [[ "${{ env.INFORMATION_NOTICE }}" == "PUSH" ]]; then
          if [[ "${{steps.compile.outcome}}" == 'success' ]]; then
            curl -k --data token="${{ secrets.PUSH_PLUS_TOKEN }}" --data title="[${{ env.SOURCE }}-${{ env.TARGET_PROFILE }}]зј–иҜ‘жҲҗеҠҹ" --data "content=жҲ‘дәІзҲұзҡ„вңЁдё»дәәвңЁпјҡжӮЁдҪҝз”ЁгҖҗ${{matrix.target}}гҖ‘ж–Үд»¶еӨ№зј–иҜ‘гҖҗ${REPO_BRANCH}еҲҶж”Ҝзҡ„${{env.TARGET_PROFILE}}гҖ‘еӣәд»¶йЎәеҲ©зј–иҜ‘е®ҢжҲҗдәҶвңҢпёҸрҹ’Ҝрҹ’җ(${{env.WAREHOUSE_MAN}}д»“еә“зҡ„#${{env.RUN_NUMBER}}еҸ·)пјҒ($(date +%Yе№ҙ%mжңҲ%dеҸ·%Hж—¶%MеҲҶ))" "http://www.pushplus.plus/send"
          fi
        fi
        if [[ "${{ env.INFORMATION_NOTICE }}" == "WX" ]]; then
          if [[ "${{steps.gitpush.outcome}}" == 'success' ]] && [[ "${{steps.compile.outcome}}" == 'success' ]]; then
            curl -k --data token="${{ secrets.WX_TOKEN }}" --data title="ејҖе§Ӣзј–иҜ‘гҖҗ${{ env.FOLDER_NAME }}гҖ‘" --data "message=рҹҺү дё»дәәрҹ’•пјҡжӮЁзҡ„зј–иҜ‘и„ҡжң¬жҲҗеҠҹи§ҰеҸ‘гҖҗ${{ env.FOLDER_NAME }}гҖ‘ж–Үд»¶еӨ№зј–иҜ‘гҖҗ${{env.TARGET_PROFILE}}гҖ‘еӣәд»¶дёӯ,иҜ·иҖҗеҝғзӯүеҫ…...... рҹҳӢ(${{env.Tongzhi_Date}})" "http://${{ secrets.CURL }}/push?token=${{ secrets.WX_TOKEN }}&"
          else
            curl -k --data token="${{ secrets.WX_TOKEN }}" --data title="и§ҰеҸ‘еҗҜеҠЁеӨұиҙҘ" --data "message=рҹ’Ҙдё»дәәвқҢ пјҡдёҠжёёжү©еұ•й”ҷиҜҜжҲ–иҖ…и„ҡжң¬й”ҷиҜҜ,и§ҰеҸ‘еҗҜеҠЁгҖҗ${{ env.FOLDER_NAME }}гҖ‘еӨұиҙҘ,иҜ·зӮ№еҮ»и§ҰеҸ‘и„ҡжң¬жӯҘйӘӨжҹҘзңӢиҜҰжғ…!(${{env.Tongzhi_Date}})" "http://${{ secrets.CURL }}/push?token=${{ secrets.WX_TOKEN }}&"
            exit 1
          fi
        fi  
